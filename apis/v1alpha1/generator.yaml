sdk_names:
  model_name: auto-scaling

operations:
  DeleteAutoScalingGroup:
    override_values:
      # Always force delete to avoid "ScalingActivityInProgress" errors
      # This allows deletion even when scaling activities are in progress
      ForceDelete: aws.Bool(true)

resources:
  AutoScalingGroup:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      # Status fields from DescribeAutoScalingGroups output
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.CreatedTime
      Instances:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.Instances
      EnabledMetrics:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.EnabledMetrics
      SuspendedProcesses:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.SuspendedProcesses
      Status:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.Status
      PredictedCapacity:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.PredictedCapacity
      WarmPoolConfiguration:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.WarmPoolConfiguration
      WarmPoolSize:
        is_read_only: true
        from:
          operation: DescribeAutoScalingGroups
          path: AutoScalingGroups.WarmPoolSize
      # Custom field mapping tag key to PropagateAtLaunch value.
      # The autoscaling CreateOrUpdateTags API supports PropagateAtLaunch per tag,
      # but we strip it from the Tag shape for cleaner CRD UX. This map lets users
      # control which tags propagate to EC2 instances launched by the ASG.
      # Keys should match tag keys in spec.tags; values are booleans.
      TagPropagateAtLaunch:
        type: "map[string]*bool"
        compare:
          is_ignored: true
      # Ignore tags in create operation - tags are synced separately
      # via the CreateOrUpdateTags/DeleteTags APIs in the syncTags hook
      Tags:
        set:
          - method: Create
            ignore: "to"
        compare:
          is_ignored: true
      # Fix type_ -> type for TrafficSources
      TrafficSources.Type:
        go_tag: json:"type,omitempty"
      # Cross-resource reference to EC2 Instance
      InstanceID:
        references:
          resource: Instance
          service_name: ec2
          path: Status.InstanceID
      # Cross-resource reference to IAM Role for service-linked role
      ServiceLinkedRoleARN:
        references:
          resource: Role
          service_name: iam
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference to IAM Role for lifecycle hooks
      LifecycleHookSpecificationList.RoleARN:
        references:
          resource: Role
          service_name: iam
          path: Status.ACKResourceMetadata.ARN
      # TODO: Enable LaunchTemplate references once known issue with code generator is fixed
      # bug is discussed in PR https://github.com/aws-controllers-k8s/autoscaling-controller/pull/3
      # # Cross-resource reference to EC2 LaunchTemplate
      # LaunchTemplate.LaunchTemplateID:
      #   references:
      #     resource: LaunchTemplate
      #     service_name: ec2
      #     path: Status.ID
      # # Cross-resource reference for MixedInstancesPolicy LaunchTemplate
      # MixedInstancesPolicy.LaunchTemplate.LaunchTemplateSpecification.LaunchTemplateID:
      #   references:
      #     resource: LaunchTemplate
      #     service_name: ec2
      #     path: Status.ID
      # Cross-resource reference to ELBv2 TargetGroups
      TargetGroupARNs:
        references:
          resource: TargetGroup
          service_name: elbv2
          path: Status.ACKResourceMetadata.ARN
    renames:
      operations:
        CreateAutoScalingGroup:
          input_fields:
            AutoScalingGroupName: Name
        UpdateAutoScalingGroup:
          input_fields:
            AutoScalingGroupName: Name
        DeleteAutoScalingGroup:
          input_fields:
            AutoScalingGroupName: Name
        DescribeAutoScalingGroups:
          input_fields:
            AutoScalingGroupNames: Names
          output_fields:
            AutoScalingGroupName: Name
    tags:
      ignore: false
    hooks:
      delta_post_compare:
        template_path: hooks/auto_scaling_group/delta_post_compare.go.tpl
      sdk_read_many_post_set_output:
        template_path: hooks/auto_scaling_group/sdk_read_many_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/auto_scaling_group/sdk_update_pre_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/auto_scaling_group/sdk_create_post_set_output.go.tpl

ignore:
  resource_names:
    - LaunchConfiguration
  field_paths:
    # remove reserved field
    - CreateAutoScalingGroupInput.Context
    # Ignore LaunchTemplateName to avoid ID vs Name conflict.
    # AWS returns both fields in responses even when only one is specified.
    # Supporting only LaunchTemplateID avoids reconciliation drift issues and the need for custom code
    - CreateAutoScalingGroupInput.LaunchTemplate.LaunchTemplateName
    - UpdateAutoScalingGroupInput.LaunchTemplate.LaunchTemplateName
    - DescribeAutoScalingGroupsOutput.AutoScalingGroups.LaunchTemplate.LaunchTemplateName
    - DescribeAutoScalingGroupsOutput.AutoScalingGroups.MixedInstancesPolicy.LaunchTemplate.LaunchTemplateSpecification.LaunchTemplateName
    - DescribeAutoScalingGroupsOutput.AutoScalingGroups.MixedInstancesPolicy.LaunchTemplate.Overrides.LaunchTemplateSpecification.LaunchTemplateName
    # Only keep Key and Value for tags - remove PropagateAtLaunch, ResourceId, ResourceType
    # Target the shared Tag and TagDescription shapes directly so fields are
    # removed from both the generated Go types and the CRD schema
    - Tag.PropagateAtLaunch
    - Tag.ResourceId
    - Tag.ResourceType
    - TagDescription.PropagateAtLaunch
    - TagDescription.ResourceId
    - TagDescription.ResourceType